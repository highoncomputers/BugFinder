{% extends "base.html" %}
{% block title %}Projects{% endblock %}
{% block content %}
<div x-data="projectsPage()" x-init="init()">
    <div class="page-header">
        <div>
            <h1 class="page-title">Projects</h1>
            <p class="page-subtitle">Organize scans by project</p>
        </div>
        <button @click="showForm = true" class="btn btn-primary">New Project</button>
    </div>

    <div x-show="showForm" class="card mb-6">
        <h2 class="card-title mb-4">Create Project</h2>
        <form @submit.prevent="createProject" class="space-y-4">
            <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" x-model="formName" required class="input">
            </div>
            <div class="form-group">
                <label class="form-label">Description (optional)</label>
                <textarea x-model="formDesc" rows="3" class="input"></textarea>
            </div>
            <div class="flex gap-3">
                <button type="submit" class="btn btn-primary">Create</button>
                <button type="button" @click="showForm = false" class="btn btn-secondary">Cancel</button>
            </div>
        </form>
    </div>

    <div class="grid grid-3 gap-4">
        <template x-for="p in projects" :key="p.id">
            <div class="card">
                <h3 class="text-sm font-semibold text-white" x-text="p.name"></h3>
                <p class="text-xs text-muted mt-1" x-text="p.description || 'No description'"></p>
                <div class="flex justify-between items-center mt-4 text-xs">
                    <span class="text-muted" x-text="p.scan_count + ' scans'"></span>
                    <span class="text-muted font-mono" x-text="new Date(p.created_at).toLocaleDateString()"></span>
                </div>
            </div>
        </template>
        <div x-show="projects.length === 0" class="empty-state" style="grid-column: 1/-1;">
            <div class="empty-state-icon">📁</div>
            <h3>No projects yet</h3>
            <p>Create your first project to organize scans.</p>
        </div>
    </div>
</div>

<script>
function projectsPage() {
    return {
        projects: [],
        showForm: false,
        formName: '',
        formDesc: '',
        async init() {
            const res = await fetch('/api/projects');
            if (res.ok) this.projects = await res.json();
        },
        async createProject() {
            const res = await fetch('/api/projects', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: this.formName, description: this.formDesc })
            });
            if (res.ok) {
                const project = await res.json();
                this.projects.push(project);
                this.showForm = false;
                this.formName = '';
                this.formDesc = '';
            }
        }
    }
}
</script>
{% endblock %}
