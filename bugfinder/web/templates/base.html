<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BugFinder — {% block title %}Dashboard{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/alpinejs@3.14.8" defer></script>
    <link rel="stylesheet" href="/static/css/app.css">
    {% block extra_head %}{% endblock %}
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
</head>
<body>
    <div class="app-layout">
        <nav class="navbar">
            <div class="navbar-inner">
                <a href="/" class="navbar-brand">
                    <span>BugFinder</span>
                </a>
                <div class="navbar-links">
                    <a href="/">Dashboard</a>
                    <a href="/scans">Scans</a>
                    <a href="/findings">Findings</a>
                    <a href="/projects">Projects</a>
                    <a href="/learn">Learn</a>
                    <a href="/plugins">Plugins</a>
                    <a href="/teams">Teams</a>
                    <a href="/exports">Exports</a>
                    <a href="/proxy">Proxy</a>
                    <a href="/graph">Graph</a>
                    <a href="/chat">AI Co-pilot</a>
                    <a href="/settings">Settings</a>
                </div>
                <div class="navbar-end">
                    <span class="navbar-version">v{{ version }}</span>
                    <a href="/login" class="btn btn-sm btn-secondary">Login</a>
                </div>
            </div>
        </nav>

        <main class="app-main">
            {% block content %}{% endblock %}
        </main>

        <footer class="footer">
            BugFinder v{{ version }} &mdash; AI-powered security assessment platform
        </footer>
    </div>
</body>
</html>
