{% extends "base.html" %}
{% block title %}Scans{% endblock %}
{% block content %}
<div x-data="scansPage()" x-init="init()">
    <h1 class="text-3xl font-bold text-white mb-8">Scans</h1>

    <div class="bg-gray-900 rounded-lg border border-gray-800 p-6">
        <div class="flex justify-between items-center mb-4">
            <div class="flex gap-2">
                <select x-model="filterStatus" class="bg-gray-800 text-white rounded px-3 py-1.5 text-sm border border-gray-700">
                    <option value="">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="running">Running</option>
                    <option value="completed">Completed</option>
                    <option value="failed">Failed</option>
                </select>
            </div>
            <span class="text-sm text-gray-400" x-text="scans.length + ' scans'"></span>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-gray-400 text-sm border-b border-gray-800">
                        <th class="pb-3 pr-4">Target</th>
                        <th class="pb-3 pr-4">Type</th>
                        <th class="pb-3 pr-4">Status</th>
                        <th class="pb-3 pr-4">Progress</th>
                        <th class="pb-3 pr-4">Findings</th>
                        <th class="pb-3 pr-4">Date</th>
                        <th class="pb-3">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="scan in filteredScans" :key="scan.id">
                        <tr class="border-b border-gray-800 hover:bg-gray-800">
                            <td class="py-3 pr-4 text-white font-mono text-sm" x-text="scan.target"></td>
                            <td class="py-3 pr-4 text-gray-400 text-sm" x-text="scan.target_type"></td>
                            <td class="py-3 pr-4">
                                <span class="text-xs px-2 py-1 rounded" :class="{
                                    'bg-green-900 text-green-400': scan.status === 'completed',
                                    'bg-yellow-900 text-yellow-400': scan.status === 'running',
                                    'bg-red-900 text-red-400': scan.status === 'failed',
                                    'bg-gray-800 text-gray-400': scan.status === 'pending'
                                }" x-text="scan.status"></span>
                            </td>
                            <td class="py-3 pr-4">
                                <div class="w-24 bg-gray-800 rounded-full h-1.5">
                                    <div class="bg-emerald-500 h-1.5 rounded-full" :style="'width: ' + scan.progress + '%'"></div>
                                </div>
                            </td>
                            <td class="py-3 pr-4 text-gray-400 text-sm" x-text="scan.findings_count"></td>
                            <td class="py-3 pr-4 text-gray-400 text-sm" x-text="new Date(scan.created_at).toLocaleDateString()"></td>
                            <td class="py-3">
                                <a :href="'/scans/' + scan.id" class="text-emerald-400 hover:text-emerald-300 text-sm">View</a>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
            <div x-show="scans.length === 0" class="text-gray-500 text-center py-8">No scans found. <a href="/" class="text-emerald-400">Start one now</a></div>
        </div>
    </div>
</div>

<script>
function scansPage() {
    return {
        scans: [],
        filterStatus: '',
        get filteredScans() {
            if (!this.filterStatus) return this.scans;
            return this.scans.filter(s => s.status === this.filterStatus);
        },
        async init() {
            const res = await fetch('/api/scans');
            if (res.ok) this.scans = await res.json();
        }
    }
}
</script>
{% endblock %}
