{% extends "base.html" %}
{% block title %}Scans{% endblock %}
{% block content %}
<div x-data="scansPage()" x-init="init()">
    <div class="page-header">
        <div>
            <h1 class="page-title">Scans</h1>
            <p class="page-subtitle">All security scans</p>
        </div>
    </div>

    <div class="card p-0">
        <div class="filter-bar">
            <select x-model="filterStatus" class="select" style="min-width: 140px;">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="running">Running</option>
                <option value="completed">Completed</option>
                <option value="failed">Failed</option>
            </select>
            <span class="filter-count" x-text="scans.length + ' scans'"></span>
        </div>

        <div class="table-container" style="border: none; border-radius: 0;">
            <table>
                <thead>
                    <tr>
                        <th>Target</th>
                        <th>Type</th>
                        <th>Status</th>
                        <th>Progress</th>
                        <th>Findings</th>
                        <th>Date</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="scan in filteredScans" :key="scan.id">
                        <tr>
                            <td class="font-mono text-sm" x-text="scan.target"></td>
                            <td class="text-sm text-muted" x-text="scan.target_type"></td>
                            <td><span class="badge" :class="{
                                'badge-open': scan.status === 'completed',
                                'badge-running': scan.status === 'running',
                                'badge-failed': scan.status === 'failed',
                                'badge-closed': scan.status === 'pending'
                            }" x-text="scan.status"></span></td>
                            <td>
                                <div class="progress-bar" style="width: 80px;">
                                    <div class="progress-bar-fill" :style="'width: ' + scan.progress + '%'"></div>
                                </div>
                            </td>
                            <td class="text-sm text-muted" x-text="scan.findings_count"></td>
                            <td class="text-sm text-muted font-mono" x-text="new Date(scan.created_at).toLocaleDateString()"></td>
                            <td><a :href="'/scans/' + scan.id" class="text-sm" style="color: #58a6ff;">View</a></td>
                        </tr>
                    </template>
                </tbody>
            </table>
            <div x-show="scans.length === 0" class="empty-state">
                <div class="empty-state-icon">📡</div>
                <h3>No scans yet</h3>
                <p>Start your first scan from the dashboard.</p>
            </div>
        </div>
    </div>
</div>

<script>
function scansPage() {
    return {
        scans: [],
        filterStatus: '',
        get filteredScans() {
            if (!this.filterStatus) return this.scans;
            return this.scans.filter(s => s.status === this.filterStatus);
        },
        async init() {
            const res = await fetch('/api/scans');
            if (res.ok) this.scans = await res.json();
        }
    }
}
</script>
{% endblock %}
