{% extends "base.html" %}
{% block title %}Teams{% endblock %}
{% block content %}
<div x-data="teamsApp()" x-init="init()">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-bold text-white">Teams</h1>
            <p class="text-gray-400 mt-1">Manage your team and collaborate on findings</p>
        </div>
        <button @click="showCreate = true" class="bg-emerald-600 text-white px-4 py-2 rounded text-sm font-medium hover:bg-emerald-700">New Team</button>
    </div>

    <div x-show="showCreate" class="mb-6 bg-gray-900 rounded-lg border border-gray-800 p-6">
        <h2 class="text-lg font-semibold text-white mb-4">Create Team</h2>
        <form @submit.prevent="createTeam()" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Team Name</label>
                <input type="text" x-model="newTeam.name" required class="w-full bg-gray-800 text-white rounded px-3 py-2 border border-gray-700 focus:border-emerald-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Description</label>
                <textarea x-model="newTeam.description" rows="2" class="w-full bg-gray-800 text-white rounded px-3 py-2 border border-gray-700 focus:border-emerald-500 focus:outline-none"></textarea>
            </div>
            <div class="flex gap-2">
                <button type="submit" class="bg-emerald-600 text-white px-4 py-2 rounded text-sm font-medium hover:bg-emerald-700">Create</button>
                <button type="button" @click="showCreate = false" class="text-gray-400 px-4 py-2 rounded text-sm hover:text-white">Cancel</button>
            </div>
        </form>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <template x-for="team in teams" :key="team.id">
            <div class="bg-gray-900 rounded-lg border border-gray-800 p-5">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="text-lg font-semibold text-white" x-text="team.name"></h3>
                        <p class="text-sm text-gray-400 mt-1" x-text="team.description || 'No description'"></p>
                    </div>
                    <button @click="deleteTeam(team.id)" class="text-gray-600 hover:text-red-400 text-xs">Delete</button>
                </div>
                <div class="mt-4 flex justify-between items-center text-sm text-gray-500">
                    <span x-text="team.member_count + ' members'"></span>
                    <button @click="viewTeam(team)" class="text-emerald-400 hover:text-emerald-300">Manage</button>
                </div>
            </div>
        </template>
        <template x-if="teams.length === 0">
            <div class="col-span-full text-center py-12 text-gray-500">
                No teams yet. Create one to get started.
            </div>
        </template>
    </div>

    <div x-show="selectedTeam" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" @click.self="selectedTeam = null">
        <div class="bg-gray-900 rounded-lg border border-gray-800 p-6 w-full max-w-lg mx-4">
            <h2 class="text-lg font-semibold text-white mb-4" x-text="'Team: ' + selectedTeam?.name"></h2>

            <h3 class="text-sm text-gray-400 mb-2">Members</h3>
            <div class="space-y-2 mb-4">
                <template x-for="member in members" :key="member.id">
                    <div class="flex justify-between items-center bg-gray-800 rounded px-3 py-2">
                        <div>
                            <span class="text-white text-sm" x-text="member.username"></span>
                            <span class="text-xs text-gray-500 ml-2" x-text="member.role"></span>
                        </div>
                        <button @click="removeMember(member.id)" class="text-xs text-red-400 hover:text-red-300">Remove</button>
                    </div>
                </template>
                <template x-if="members.length === 0">
                    <div class="text-gray-500 text-sm text-center py-2">No members</div>
                </template>
            </div>

            <div class="flex gap-2">
                <input type="text" x-model="newMemberUsername" placeholder="Username" class="flex-1 bg-gray-800 text-white rounded px-3 py-2 text-sm border border-gray-700 focus:border-emerald-500 focus:outline-none">
                <button @click="addMember()" class="bg-emerald-600 text-white px-4 py-2 rounded text-sm font-medium hover:bg-emerald-700">Add</button>
            </div>

            <button @click="selectedTeam = null" class="mt-4 text-gray-400 text-sm hover:text-white">Close</button>
        </div>
    </div>
</div>

<script>
function teamsApp() {
    return {
        teams: [],
        selectedTeam: null,
        members: [],
        showCreate: false,
        newTeam: { name: '', description: '' },
        newMemberUsername: '',

        async init() {
            await this.loadTeams();
        },

        async loadTeams() {
            const res = await fetch('/api/teams');
            if (res.ok) this.teams = await res.json();
        },

        async createTeam() {
            const res = await fetch('/api/teams', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(this.newTeam)
            });
            if (res.ok) {
                this.newTeam = { name: '', description: '' };
                this.showCreate = false;
                await this.loadTeams();
            }
        },

        async deleteTeam(id) {
            if (!confirm('Delete this team?')) return;
            await fetch('/api/teams/' + id, { method: 'DELETE' });
            await this.loadTeams();
        },

        async viewTeam(team) {
            this.selectedTeam = team;
            this.members = [];
            this.newMemberUsername = '';
            const res = await fetch('/api/teams/' + team.id + '/members');
            if (res.ok) this.members = await res.json();
        },

        async addMember() {
            if (!this.newMemberUsername || !this.selectedTeam) return;
            const res = await fetch('/api/teams/' + this.selectedTeam.id + '/members', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: this.newMemberUsername })
            });
            if (res.ok) {
                this.newMemberUsername = '';
                const r = await fetch('/api/teams/' + this.selectedTeam.id + '/members');
                if (r.ok) this.members = await r.json();
            }
        },

        async removeMember(userId) {
            if (!this.selectedTeam) return;
            await fetch('/api/teams/' + this.selectedTeam.id + '/members/' + userId, { method: 'DELETE' });
            const res = await fetch('/api/teams/' + this.selectedTeam.id + '/members');
            if (res.ok) this.members = await res.json();
        }
    }
}
</script>
{% endblock %}
