{% extends "base.html" %}
{% block title %}Finding {{ finding_id }}{% endblock %}
{% block content %}
<div x-data="findingDetail({{ finding_id }})" x-init="init()">
    <div class="mb-6">
        <a href="/findings" class="text-muted text-sm hover:text-white transition">&larr; Back to Findings</a>
        <h1 class="page-title mt-2" x-text="finding ? finding.title : 'Loading...'"></h1>
    </div>

    <template x-if="finding">
        <div class="grid grid-3 gap-6">
            <div class="flex flex-col gap-6" style="grid-column: span 2;">
                <div class="card">
                    <h2 class="card-title mb-3">Description</h2>
                    <p class="text-sm text-white leading-relaxed" x-text="finding.description"></p>
                </div>

                <div class="card" x-show="finding.evidence">
                    <h2 class="card-title mb-3">Evidence</h2>
                    <pre class="font-mono" x-text="JSON.stringify(finding.evidence, null, 2)"></pre>
                </div>

                <div class="card" x-show="finding.remediation">
                    <h2 class="card-title mb-3">Existing Remediation</h2>
                    <p class="text-sm text-white leading-relaxed" x-text="finding.remediation"></p>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Auto-Fix Suggestions</h2>
                    </div>
                    <button @click="loadAutoFix()" :disabled="autoFixLoading" class="btn btn-primary btn-sm">
                        <span x-show="!autoFixLoading">Generate Fixes</span>
                        <span x-show="autoFixLoading">Loading...</span>
                    </button>
                    <template x-if="autoFixes.length > 0">
                        <div class="space-y-4 mt-4">
                            <template x-for="(fix, i) in autoFixes" :key="i">
                                <div class="p-3 rounded" style="background: rgba(22,27,34,0.6); border: 1px solid #21262d;">
                                    <h3 class="text-sm font-medium text-white mb-1" x-text="fix.title"></h3>
                                    <p class="text-xs text-muted mb-2" x-text="fix.description"></p>
                                    <template x-for="(cf, j) in fix.code_fixes" :key="'code-' + j">
                                        <div class="mb-2">
                                            <div class="flex justify-between items-center mb-1">
                                                <span class="text-xs text-muted" x-text="cf.label"></span>
                                                <span class="text-xs text-muted font-mono" x-text="cf.language"></span>
                                            </div>
                                            <pre class="font-mono" style="color: #7ee787;" x-text="cf.code"></pre>
                                        </div>
                                    </template>
                                    <template x-for="(cfg, j) in fix.config_fixes" :key="'cfg-' + j">
                                        <div class="mb-2">
                                            <div class="flex justify-between items-center mb-1">
                                                <span class="text-xs text-muted" x-text="cfg.title"></span>
                                                <span class="text-xs text-muted">config</span>
                                            </div>
                                            <pre class="font-mono" style="color: #58a6ff;" x-text="cfg.code"></pre>
                                        </div>
                                    </template>
                                    <template x-if="fix.references && fix.references.length > 0">
                                        <div class="mt-1">
                                            <span class="text-xs text-muted">References:</span>
                                            <template x-for="ref in fix.references">
                                                <a :href="ref" target="_blank" class="text-xs ml-2" style="color: #58a6ff;" x-text="ref.split('/').slice(-2).join('/')"></a>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Comments</h2>
                        <span class="text-xs text-muted" x-text="comments.length"></span>
                    </div>
                    <div class="space-y-3 mb-4">
                        <template x-for="comment in comments" :key="comment.id">
                            <div class="p-3 rounded" style="background: rgba(22,27,34,0.6); border: 1px solid #21262d;">
                                <div class="flex justify-between items-start">
                                    <span class="text-xs font-medium text-white" x-text="comment.author"></span>
                                    <span class="text-xs text-muted" x-text="comment.created_at"></span>
                                </div>
                                <p class="text-sm text-muted mt-1" x-text="comment.content"></p>
                            </div>
                        </template>
                        <template x-if="comments.length === 0">
                            <div class="text-xs text-muted text-center py-4">No comments yet</div>
                        </template>
                    </div>
                    <div class="flex gap-2">
                        <textarea x-model="newComment" rows="2" placeholder="Add a comment..." class="input font-mono text-xs flex-1" style="resize: none;"></textarea>
                        <button @click="addComment()" :disabled="!newComment.trim()" class="btn btn-primary btn-sm self-end">Comment</button>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <div class="card">
                    <h3 class="card-title mb-3">Details</h3>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between">
                            <span class="text-muted">Severity</span>
                            <span class="badge" :class="{
                                'badge-critical': finding.severity === 'critical',
                                'badge-high': finding.severity === 'high',
                                'badge-medium': finding.severity === 'medium',
                                'badge-low': finding.severity === 'low',
                                'badge-info': finding.severity === 'info'
                            }" x-text="finding.severity"></span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-muted">Confidence</span>
                            <span class="badge badge-info" x-text="finding.confidence"></span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-muted">Status</span>
                            <span class="text-xs text-white" x-text="finding.status"></span>
                        </div>
                        <div class="flex justify-between" x-show="finding.cwe_id">
                            <span class="text-muted">CWE</span>
                            <span class="text-xs text-white font-mono" x-text="'CWE-' + finding.cwe_id"></span>
                        </div>
                        <div class="flex justify-between" x-show="finding.owasp_category">
                            <span class="text-muted">OWASP</span>
                            <span class="text-xs text-white" x-text="finding.owasp_category"></span>
                        </div>
                        <div class="flex justify-between" x-show="finding.cvss_score">
                            <span class="text-muted">CVSS</span>
                            <span class="text-xs text-white font-mono" x-text="finding.cvss_score"></span>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h3 class="card-title mb-3">Actions</h3>
                    <div class="flex flex-col gap-2">
                        <button @click="updateStatus('confirmed')" class="btn btn-primary btn-sm w-full">Confirm</button>
                        <button @click="updateStatus('false_positive')" class="btn btn-danger btn-sm w-full">False Positive</button>
                        <button @click="updateStatus('fixed')" class="btn btn-secondary btn-sm w-full">Mark Fixed</button>
                    </div>
                </div>

                <div class="card">
                    <h3 class="card-title mb-3">Exploit & Verify</h3>
                    {% include "exploit_panel.html" %}
                </div>
            </div>
        </div>
    </template>
</div>

<script>
function findingDetail(findingId) {
    return {
        finding: null,
        autoFixes: [],
        autoFixLoading: false,
        comments: [],
        newComment: '',
        async init() {
            const res = await fetch('/api/findings/' + findingId);
            if (res.ok) this.finding = await res.json();
            await this.loadComments();
        },
        async updateStatus(status) {
            const res = await fetch('/api/findings/' + findingId, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status })
            });
            if (res.ok) this.finding = await res.json();
        },
        async loadComments() {
            const res = await fetch('/api/findings/' + findingId + '/comments');
            if (res.ok) this.comments = await res.json();
        },
        async addComment() {
            if (!this.newComment.trim()) return;
            const res = await fetch('/api/findings/' + findingId + '/comments', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ content: this.newComment })
            });
            if (res.ok) {
                this.newComment = '';
                await this.loadComments();
            }
        },
        async loadAutoFix() {
            this.autoFixLoading = true;
            try {
                const res = await fetch('/api/remediation/' + findingId);
                if (res.ok) {
                    const data = await res.json();
                    this.autoFixes = data.fixes;
                }
            } catch (_) {} finally {
                this.autoFixLoading = false;
            }
        }
    }
}
</script>
{% endblock %}
