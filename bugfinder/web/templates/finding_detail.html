{% extends "base.html" %}
{% block title %}Finding {{ finding_id }}{% endblock %}
{% block content %}
<div x-data="findingDetail({{ finding_id }})" x-init="init()">
    <div class="mb-8">
        <a href="/findings" class="text-emerald-400 hover:text-emerald-300 text-sm">&larr; Back to Findings</a>
        <h1 class="text-3xl font-bold text-white mt-2" x-text="finding ? finding.title : 'Loading...'"></h1>
    </div>

    <template x-if="finding">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-gray-900 rounded-lg border border-gray-800 p-6">
                    <h2 class="text-lg font-semibold text-white mb-3">Description</h2>
                    <p class="text-gray-300 leading-relaxed" x-text="finding.description"></p>
                </div>

                <div class="bg-gray-900 rounded-lg border border-gray-800 p-6" x-show="finding.evidence">
                    <h2 class="text-lg font-semibold text-white mb-3">Evidence</h2>
                    <pre class="bg-gray-950 text-gray-300 p-4 rounded overflow-x-auto text-sm font-mono" x-text="JSON.stringify(finding.evidence, null, 2)"></pre>
                </div>

                <div class="bg-gray-900 rounded-lg border border-gray-800 p-6" x-show="finding.remediation">
                    <h2 class="text-lg font-semibold text-white mb-3">Existing Remediation</h2>
                    <p class="text-gray-300 leading-relaxed" x-text="finding.remediation"></p>
                </div>

                <div class="bg-gray-900 rounded-lg border border-gray-800 p-6">
                    <h2 class="text-lg font-semibold text-white mb-3">Auto-Fix Suggestions</h2>
                    <div id="auto-fix-content">
                        <button @click="loadAutoFix()" :disabled="autoFixLoading" class="bg-emerald-600 text-white px-4 py-1.5 rounded text-sm hover:bg-emerald-700 disabled:opacity-50">
                            <span x-show="!autoFixLoading">Generate Fixes</span>
                            <span x-show="autoFixLoading">Loading...</span>
                        </button>
                    </div>
                    <template x-if="autoFixes.length > 0">
                        <div class="mt-4 space-y-4">
                            <template x-for="(fix, i) in autoFixes" :key="i">
                                <div>
                                    <h3 class="text-sm font-medium text-emerald-400 mb-1" x-text="fix.title"></h3>
                                    <p class="text-xs text-gray-400 mb-2" x-text="fix.description"></p>

                                    <template x-for="(cf, j) in fix.code_fixes" :key="'code-' + j">
                                        <div class="mb-2">
                                            <div class="flex justify-between items-center mb-1">
                                                <span class="text-xs text-gray-500" x-text="cf.label"></span>
                                                <span class="text-xs text-gray-600 font-mono" x-text="cf.language"></span>
                                            </div>
                                            <pre class="bg-gray-950 text-green-300 p-3 rounded text-xs font-mono overflow-x-auto" x-text="cf.code"></pre>
                                        </div>
                                    </template>

                                    <template x-for="(cfg, j) in fix.config_fixes" :key="'cfg-' + j">
                                        <div class="mb-2">
                                            <div class="flex justify-between items-center mb-1">
                                                <span class="text-xs text-gray-500" x-text="cfg.title"></span>
                                                <span class="text-xs text-gray-600">config</span>
                                            </div>
                                            <pre class="bg-gray-950 text-blue-300 p-3 rounded text-xs font-mono overflow-x-auto" x-text="cfg.code"></pre>
                                        </div>
                                    </template>

                                    <template x-if="fix.references.length > 0">
                                        <div class="mt-1">
                                            <span class="text-xs text-gray-500">References:</span>
                                            <template x-for="ref in fix.references">
                                                <a :href="ref" target="_blank" class="text-xs text-blue-400 hover:text-blue-300 ml-2" x-text="ref.split('/').slice(-2).join('/')"></a>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>

            <div class="space-y-4">
                <div class="bg-gray-900 rounded-lg border border-gray-800 p-4">
                    <h3 class="text-sm text-gray-400 mb-3">Details</h3>
                    <dl class="space-y-2">
                        <div class="flex justify-between">
                            <dt class="text-gray-500 text-sm">Severity</dt>
                            <dd><span class="text-xs px-2 py-0.5 rounded font-medium" :class="{
                                'bg-red-900 text-red-400': finding.severity === 'critical',
                                'bg-orange-900 text-orange-400': finding.severity === 'high',
                                'bg-yellow-900 text-yellow-400': finding.severity === 'medium',
                                'bg-blue-900 text-blue-400': finding.severity === 'low',
                                'bg-gray-800 text-gray-400': finding.severity === 'info'
                            }" x-text="finding.severity"></span></dd>
                        </div>
                        <div class="flex justify-between">
                            <dt class="text-gray-500 text-sm">Confidence</dt>
                            <dd class="text-white text-sm" x-text="finding.confidence"></dd>
                        </div>
                        <div class="flex justify-between">
                            <dt class="text-gray-500 text-sm">Status</dt>
                            <dd class="text-white text-sm" x-text="finding.status"></dd>
                        </div>
                        <div class="flex justify-between" x-show="finding.cwe_id">
                            <dt class="text-gray-500 text-sm">CWE</dt>
                            <dd class="text-white text-sm" x-text="'CWE-' + finding.cwe_id"></dd>
                        </div>
                        <div class="flex justify-between" x-show="finding.owasp_category">
                            <dt class="text-gray-500 text-sm">OWASP</dt>
                            <dd class="text-white text-sm" x-text="finding.owasp_category"></dd>
                        </div>
                        <div class="flex justify-between" x-show="finding.cvss_score">
                            <dt class="text-gray-500 text-sm">CVSS</dt>
                            <dd class="text-white text-sm" x-text="finding.cvss_score"></dd>
                        </div>
                    </dl>
                </div>

                <div class="bg-gray-900 rounded-lg border border-gray-800 p-4">
                    <h3 class="text-sm text-gray-400 mb-3">Actions</h3>
                    <div class="space-y-2">
                        <button @click="updateStatus('confirmed')" class="w-full bg-green-700 text-white px-3 py-1.5 rounded text-sm hover:bg-green-600">Confirm</button>
                        <button @click="updateStatus('false_positive')" class="w-full bg-red-700 text-white px-3 py-1.5 rounded text-sm hover:bg-red-600">False Positive</button>
                        <button @click="updateStatus('fixed')" class="w-full bg-blue-700 text-white px-3 py-1.5 rounded text-sm hover:bg-blue-600">Mark Fixed</button>
                    </div>
                </div>

                <div class="bg-gray-900 rounded-lg border border-gray-800 p-4">
                    <h3 class="text-sm text-gray-400 mb-3">Exploit & Verify</h3>
                    <div id="exploit-panel">
                        {% include "exploit_panel.html" %}
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 mt-6">
            <div class="bg-gray-900 rounded-lg border border-gray-800 p-6">
                <h2 class="text-lg font-semibold text-white mb-4">Comments</h2>
                <div class="space-y-3 mb-4">
                    <template x-for="comment in comments" :key="comment.id">
                        <div class="bg-gray-800 rounded p-3">
                            <div class="flex justify-between items-start">
                                <div>
                                    <span class="text-sm font-medium text-emerald-400" x-text="comment.author"></span>
                                    <span class="text-xs text-gray-500 ml-2" x-text="comment.created_at"></span>
                                </div>
                            </div>
                            <p class="text-sm text-gray-300 mt-1" x-text="comment.content"></p>
                        </div>
                    </template>
                    <template x-if="comments.length === 0">
                        <div class="text-gray-500 text-sm text-center py-4">No comments yet</div>
                    </template>
                </div>
                <div class="flex gap-2">
                    <textarea x-model="newComment" rows="2" placeholder="Add a comment..." class="flex-1 bg-gray-800 text-white rounded px-3 py-2 text-sm border border-gray-700 focus:border-emerald-500 focus:outline-none resize-none"></textarea>
                    <button @click="addComment()" :disabled="!newComment.trim()" class="self-end bg-emerald-600 text-white px-4 py-2 rounded text-sm font-medium hover:bg-emerald-700 disabled:opacity-50">Comment</button>
                </div>
            </div>
        </div>
    </template>
</div>

<script>
function findingDetail(findingId) {
    return {
        finding: null,
        autoFixes: [],
        autoFixLoading: false,
        async init() {
            const res = await fetch('/api/findings/' + findingId);
            if (res.ok) this.finding = await res.json();
            await this.loadComments();
        },
        async updateStatus(status) {
            const res = await fetch('/api/findings/' + findingId, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status })
            });
            if (res.ok) {
                this.finding = await res.json();
            }
        },
        comments: [],
        newComment: '',
        async loadComments() {
            const res = await fetch('/api/findings/' + findingId + '/comments');
            if (res.ok) this.comments = await res.json();
        },
        async addComment() {
            if (!this.newComment.trim()) return;
            const res = await fetch('/api/findings/' + findingId + '/comments', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ content: this.newComment })
            });
            if (res.ok) {
                this.newComment = '';
                await this.loadComments();
            }
        },
        async loadAutoFix() {
            this.autoFixLoading = true;
            try {
                const res = await fetch('/api/remediation/' + findingId);
                if (res.ok) {
                    const data = await res.json();
                    this.autoFixes = data.fixes;
                }
            } catch (_) {} finally {
                this.autoFixLoading = false;
            }
        }
    }
}
</script>
{% endblock %}
