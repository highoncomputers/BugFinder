{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="bg-gray-900 rounded-lg border border-gray-800 p-8 w-full max-w-md" x-data="loginForm()">
        <h1 class="text-2xl font-bold text-white mb-6 text-center">Login to BugFinder</h1>

        <form @submit.prevent="login" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">API Key</label>
                <input type="password" x-model="apiKey" required placeholder="Enter your NVIDIA API key or BF API key" class="w-full bg-gray-800 text-white rounded px-3 py-2 border border-gray-700 focus:border-emerald-500 focus:outline-none">
            </div>
            <button type="submit" class="w-full bg-emerald-600 text-white px-4 py-2 rounded font-medium hover:bg-emerald-700 transition" x-text="loading ? 'Logging in...' : 'Login'"></button>
            <p x-show="error" class="text-red-400 text-sm text-center" x-text="error"></p>
            <p x-show="success" class="text-green-400 text-sm text-center">Login successful! Redirecting...</p>
        </form>
    </div>
</div>

<script>
function loginForm() {
    return {
        apiKey: '',
        loading: false,
        error: '',
        success: false,
        async login() {
            this.loading = true;
            this.error = '';
            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ api_key: this.apiKey })
                });
                if (res.ok) {
                    this.success = true;
                    setTimeout(() => window.location.href = '/', 1000);
                } else {
                    this.error = 'Invalid API key';
                }
            } catch (e) {
                this.error = 'Connection error';
            }
            this.loading = false;
        }
    }
}
</script>
{% endblock %}
