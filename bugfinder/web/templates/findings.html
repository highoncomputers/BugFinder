{% extends "base.html" %}
{% block title %}Findings{% endblock %}
{% block content %}
<div x-data="findingsPage()" x-init="init()">
    <div class="page-header">
        <div>
            <h1 class="page-title">Findings</h1>
            <p class="page-subtitle">All discovered security findings</p>
        </div>
    </div>

    <div class="card p-0">
        <div class="filter-bar">
            <select x-model="filterSeverity" class="select" style="min-width: 140px;">
                <option value="">All Severities</option>
                <option value="critical">Critical</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
                <option value="info">Info</option>
            </select>
            <select x-model="filterStatus" class="select" style="min-width: 140px;">
                <option value="">All Status</option>
                <option value="open">Open</option>
                <option value="confirmed">Confirmed</option>
                <option value="false_positive">False Positive</option>
                <option value="fixed">Fixed</option>
            </select>
            <span class="filter-count" x-text="filteredFindings.length + ' findings'"></span>
        </div>

        <div class="space-y-2 p-4">
            <template x-for="f in filteredFindings" :key="f.id">
                <a :href="'/findings/' + f.id" class="card card-clickable block">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="text-sm font-medium text-white" x-text="f.title"></div>
                            <div class="text-xs text-muted mt-0.5" x-text="f.category"></div>
                        </div>
                        <div class="flex gap-2 ml-4 items-center">
                            <span class="badge" :class="{
                                'badge-critical': f.severity === 'critical',
                                'badge-high': f.severity === 'high',
                                'badge-medium': f.severity === 'medium',
                                'badge-low': f.severity === 'low',
                                'badge-info': f.severity === 'info'
                            }" x-text="f.severity"></span>
                            <span class="text-xs text-muted font-mono" x-text="f.cwe_id ? 'CWE-' + f.cwe_id : ''"></span>
                        </div>
                    </div>
                </a>
            </template>
            <div x-show="filteredFindings.length === 0" class="empty-state">
                <div class="empty-state-icon">🔍</div>
                <h3>No findings</h3>
                <p>No findings match your filters.</p>
            </div>
        </div>
    </div>
</div>

<script>
function findingsPage() {
    return {
        findings: [],
        filterSeverity: '',
        filterStatus: '',
        get filteredFindings() {
            return this.findings.filter(f => {
                if (this.filterSeverity && f.severity !== this.filterSeverity) return false;
                if (this.filterStatus && f.status !== this.filterStatus) return false;
                return true;
            });
        },
        async init() {
            const res = await fetch('/api/findings');
            if (res.ok) this.findings = await res.json();
        }
    }
}
</script>
{% endblock %}
