{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<div x-data="dashboard()" x-init="init()">
    <div class="page-header">
        <div>
            <h1 class="page-title">Dashboard</h1>
            <p class="page-subtitle">Overview of your security assessments</p>
        </div>
    </div>

    <div class="stat-grid">
        <div class="stat-card">
            <div class="stat-label">Projects</div>
            <div class="stat-value" x-text="stats.total_projects">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Scans</div>
            <div class="stat-value" x-text="stats.total_scans">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Findings</div>
            <div class="stat-value" x-text="stats.total_findings">0</div>
        </div>
        <div class="stat-card" style="border-color: rgba(248,81,73,0.3);">
            <div class="stat-label" style="color: #f85149;">Critical</div>
            <div class="stat-value" style="color: #f85149;" x-text="stats.critical_findings">0</div>
        </div>
        <div class="stat-card" style="border-color: rgba(210,153,34,0.3);">
            <div class="stat-label" style="color: #d29922;">High</div>
            <div class="stat-value" style="color: #d29922;" x-text="stats.high_findings">0</div>
        </div>
    </div>

    <div class="grid grid-2 gap-8">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Start New Scan</h2>
            </div>
            <form @submit.prevent="startScan" class="space-y-4">
                <div class="form-group">
                    <label class="form-label">Target</label>
                    <input type="text" x-model="form.target" required placeholder="https://example.com or app.apk" class="input font-mono">
                </div>
                <div class="grid grid-2 gap-4">
                    <div class="form-group">
                        <label class="form-label">Profile</label>
                        <select x-model="form.profile" class="select">
                            <option value="quick">Quick</option>
                            <option value="deep">Deep</option>
                            <option value="expert">Expert</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Project (optional)</label>
                        <select x-model="form.project_id" class="select">
                            <option value="">None</option>
                            <template x-for="p in projects" :key="p.id">
                                <option :value="p.id" x-text="p.name"></option>
                            </template>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" :disabled="scanning" x-text="scanning ? 'Starting scan...' : 'Start Scan'"></button>
            </form>
            <div x-show="scanError" class="alert alert-error mt-4" x-text="scanError"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Recent Scans</h2>
            </div>
            <div class="space-y-3">
                <template x-for="scan in stats.recent_scans" :key="scan.id">
                    <a :href="'/scans/' + scan.id" class="card card-clickable block">
                        <div class="flex justify-between items-center">
                            <div>
                                <div class="text-sm font-medium text-white" x-text="scan.target"></div>
                                <div class="text-xs text-muted mt-1" x-text="scan.target_type"></div>
                            </div>
                            <div class="text-right">
                                <span class="badge" :class="{
                                    'badge-open': scan.status === 'completed',
                                    'badge-running': scan.status === 'running',
                                    'badge-failed': scan.status === 'failed',
                                    'badge-closed': scan.status === 'pending'
                                }" x-text="scan.status"></span>
                                <div class="text-xs text-muted mt-1" x-text="scan.findings_count + ' findings'"></div>
                            </div>
                        </div>
                    </a>
                </template>
                <div x-show="!stats.recent_scans || stats.recent_scans.length === 0" class="empty-state">
                    <div class="empty-state-icon">📡</div>
                    <p>No scans yet. Start your first scan above.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function dashboard() {
    return {
        stats: { total_projects: 0, total_scans: 0, total_findings: 0, critical_findings: 0, high_findings: 0, medium_findings: 0, low_findings: 0, info_findings: 0, scans_by_status: {}, recent_scans: [] },
        projects: [],
        form: { target: '', profile: 'deep', project_id: '' },
        scanning: false,
        scanError: '',
        async init() {
            const [statsRes, projectsRes] = await Promise.all([
                fetch('/api/dashboard/stats'),
                fetch('/api/projects')
            ]);
            if (statsRes.ok) this.stats = await statsRes.json();
            if (projectsRes.ok) this.projects = await projectsRes.json();
        },
        async startScan() {
            this.scanning = true;
            this.scanError = '';
            try {
                const res = await fetch('/api/scans', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(this.form)
                });
                if (res.ok) {
                    const scan = await res.json();
                    window.location.href = '/scans/' + scan.id;
                } else {
                    const err = await res.text();
                    this.scanError = err;
                }
            } catch (e) {
                this.scanError = 'Connection error';
            }
            this.scanning = false;
        }
    }
}
</script>
{% endblock %}
